<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>TOEIC單字卡</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="index.css">
<script defer src="index.js"></script>
<style>
.speak-button {
  margin-left: 6px;
  cursor: pointer;
  padding: 4px 8px;
  border: 1px solid #333;
  border-radius: 4px;
  background-color: #eee;
  font-size: 12px;
}
.speak-button:hover { background-color: #ddd; }.section {
  margin-bottom: 24px;
  border: 1px solid #444;
  border-radius: 6px;
  overflow: hidden;
}
.section-title {
  background-color: #333;
  color: #00ff99;
  padding: 10px;
  font-size: 18px;
  font-weight: bold;
  cursor: pointer;
  display: flex;
  align-items: center;
}
.arrow { margin-right: 8px; transition: transform 0.3s; }
.arrow.rotate { transform: rotate(90deg); }.content-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  padding: 12px;
}
.term-card {
  background-color: #222;
  color: #fff;
  padding: 12px;
  border-radius: 6px;
  border: 1px solid #444;
}
.main-text { font-size: 16px; font-weight: bold; }
.sub-text { font-size: 14px; margin-top: 4px; color: #ccc; }@media (max-width: 768px) {
  .content-row { grid-template-columns: 1fr; }
}
.collapsed { display: none; }.controls { margin-bottom: 20px; display:flex; align-items:center; gap:8px; flex-wrap:wrap;}
.control-button {
  margin-right: 10px;
  padding: 6px 12px;
  border: 1px solid #333;
  border-radius: 4px;
  background-color: #eee;
  cursor: pointer;
}
.control-button:hover { background-color: #ddd; }.file-select {
  padding:6px 8px;
  border-radius:4px;
  border:1px solid #333;
  background:#111;
  color:#fff;
}.search-box { margin: 20px 0; text-align: center; }
.search-input {
  padding: 8px;
  width: 250px;
  border: 2px solid #0f0;
  border-radius: 6px;
  background-color: #111;
  color: #fff;
}
.search-button {
  padding: 8px 12px;
  margin-left: 8px;
  border: 2px solid #0f0;
  border-radius: 6px;
  background-color: #0f0;
  color: #000;
  cursor: pointer;
}
.search-button:hover { background-color: #00ff88; }
.highlight { background-color: yellow; color: black; font-weight: bold; }.back-button { display:inline-block; margin-bottom:10px; color:#00f; text-decoration:none; }
</style>
</head>
<body>
<div class="content-wrapper">
  <a href="index.html" class="back-button">🏠 返回主頁</a>
  <h2>📘 TOEIC 單字</h2>  <!-- 檔案選擇 + 全部展開 / 收合 控制 -->
  <div class="controls">
    <select id="fileSelect" class="file-select"></select>
    <button id="btnLoadFile" class="control-button">載入檔案</button>
    <button class="control-button" onclick="expandAll()">全部展開</button>
    <button class="control-button" onclick="collapseAll()">全部收合</button>
  </div>  <!-- 搜尋框 -->
  <div class="search-box">
    <input type="text" id="searchInput" class="search-input" placeholder="輸入英文單字搜尋...">
    <button class="search-button" onclick="searchWord()">搜尋</button>
  </div>  <div id="word-container"></div>
</div><script>
// 若你的 index.js 已實作 initFileLoader / loadFileAndRender / renderCardsFromText
// 則 initFileLoader() 會被呼叫（index.js 應該在 DOMContentLoaded 註冊）；
// 若沒有，下面會嘗試載入 txt/files.json，若仍然找不到，使用 fallbackList 內的檔名。const fallbackList = ["單字.txt", "Word UP"]; // 從你提供的資料夾截圖建立的備援清單document.addEventListener("DOMContentLoaded", () => {
  // 先嘗試使用 index.js 裡的 initFileLoader
  if (typeof initFileLoader === "function") {
    try { initFileLoader(); } catch(e){ console.error("initFileLoader error:", e); }
  } else {
    // 取 files.json（建議在 txt/ 下放 txt/files.json）
    fetch("txt/files.json")
      .then(r => { if (!r.ok) throw new Error("files.json 讀取失敗"); return r.json(); })
      .then(list => {
        populateFileSelect(list);
        if (list && list.length) loadFile(list[0]);
      })
      .catch(err => {
        console.warn("無 files.json，使用 fallback 名單或預設單字.txt", err);
        populateFileSelect(fallbackList);
        loadFile(fallbackList[0]);
      });
  }  // 綁定載入按鈕
  const btn = document.getElementById("btnLoadFile");
  btn.addEventListener("click", () => {
    const select = document.getElementById("fileSelect");
    const fn = select.value;
    if (!fn) return;
    // 若 index.js 實作了 loadFileAndRender，呼叫它
    if (typeof loadFileAndRender === "function") {
      loadFileAndRender(fn);
    } else {
      loadFile(fn);
    }
  });
});function populateFileSelect(list){
  const sel = document.getElementById("fileSelect");
  sel.innerHTML = "";
  (list || []).forEach(fn => {
    const opt = document.createElement("option");
    opt.value = fn;
    opt.textContent = fn;
    sel.appendChild(opt);
  });
}function loadFile(filename){
  fetch(txt/${encodeURIComponent(filename)})
    .then(r => { if(!r.ok) throw new Error("檔案讀取失敗: " + r.status); return r.text(); })
    .then(text => {
      if (typeof renderCardsFromText === "function") {
        renderCardsFromText(text);
      } else {
        fallbackRender(text);
      }
    })
    .catch(err => {
      document.getElementById("word-container").innerHTML = "<p style='color:red'>讀取失敗：" + err.message + "</p>";
      console.error(err);
    });
}// 舊版程式的 fallback renderer（與你原本的邏輯一致並加入 escape）
function fallbackRender(text) {
  const lines = text.split("\n").map(line => line.trim()).filter(line => line);
  const container = document.getElementById("word-container");
  container.innerHTML = "";  let section = null;
  let row = null;  lines.forEach(line => {
    if (/^單字/.test(line)) {
      section = document.createElement("section");
      section.className = "collapsed";  
const title = document.createElement("div");
  title.className = "section-title";

  const arrow = document.createElement("span");
  arrow.className = "arrow";
  arrow.textContent = "▶";

  title.appendChild(arrow);
  title.appendChild(document.createTextNode(line));

  row = document.createElement("div");
  row.className = "content-row";

  title.addEventListener("click", () => {
    row.classList.toggle("collapsed");
    arrow.classList.toggle("rotate");
    arrow.textContent = arrow.classList.contains("rotate") ? "▼" : "▶";
  });

  section.appendChild(title);
  section.appendChild(row);
  container.appendChild(section);
} else {
  const idx = line.indexOf("|");
  if (idx !== -1 && row) {
    const word = line.substring(0, idx).trim();
    const meaning = line.substring(idx + 1).trim();

    const card = document.createElement("div");
    card.className = "term-card";
    card.dataset.word = word;
    card.innerHTML = `
      <div class="main-text">
        <span class="word">${escapeHtml(word)}</span>
        <button class="speak-button" onclick="speakWord('${escapeJs(word)}','en-GB')">英式</button>
        <button class="speak-button" onclick="speakWord('${escapeJs(word)}','en-US')">美式</button>
        <button class="speak-button" onclick="repeatSpeak('${escapeJs(word)}','en-GB')">英式重播</button>
        <button class="speak-button" onclick="repeatSpeak('${escapeJs(word)}','en-US')">美式重播</button>
      </div>
      <div class="sub-text">${escapeHtml(meaning)}</div>
    `;
    row.appendChild(card);
  }
}  
});
}// escape helpers
function escapeHtml(s){ if (s == null) return ""; return String(s).replace(/&/g,'&').replace(/</g,'<').replace(/>/g,'>').replace(/"/g,'"').replace(/'/g,'''); }
function escapeJs(s){ if (s == null) return ""; return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }// 以下保留你頁面應用的函式：expandAll, collapseAll, searchWord
function expandAll() {
  document.querySelectorAll("section").forEach(section => {
    section.classList.remove("collapsed");
    section.classList.add("expanded");
    const arrow = section.querySelector(".arrow");
    if (arrow) arrow.textContent = "▼";
  });
}function collapseAll() {
  document.querySelectorAll("section").forEach(section => {
    section.classList.remove("expanded");
    section.classList.add("collapsed");
    const arrow = section.querySelector(".arrow");
    if (arrow) arrow.textContent = "▶";
  });
}function searchWord() {
  const query = document.getElementById("searchInput").value.trim().toLowerCase();
  if (!query) return;  let found = false;  document.querySelectorAll(".term-card").forEach(card => {
    const word = (card.dataset.word || "").toLowerCase();
    const section = card.closest("section");
const wordSpan = card.querySelector(".word");
if (wordSpan) wordSpan.classList.remove("highlight");

if (word.includes(query)) {
  found = true;
  if (section) {
    section.classList.remove("collapsed");
    section.classList.add("expanded");
    const arrow = section.querySelector(".arrow");
    if (arrow) arrow.textContent = "▼";
  }
  if (wordSpan) wordSpan.classList.add("highlight");
  card.scrollIntoView({ behavior: "smooth", block: "center" });
}  });  if (!found) alert("找不到該單字！");
}
</script>
</body>
</html>
