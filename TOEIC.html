<script>
// иЁҳйҢ„йҮҚж’ӯзӢҖж…Ӣ
const repeatStatus = {};
const container = document.getElementById("word-container");

// еҲқе§ӢеҢ–пјҡе…ҲжҠ“еҸ– list.json зҙўеј•жӘ”пјҢеҶҚдҫқеәҸијүе…ҘжүҖжңү .txt
async function init() {
  container.innerHTML = "жӯЈеңЁи®ҖеҸ–зҙўеј•жӘ”...";

  try {
    // и®ҖеҸ– list.json зҚІеҸ–жӘ”жЎҲжё…е–®
    const listResponse = await fetch("txt/list.json");
    if (!listResponse.ok) throw new Error("з„Ўжі•и®ҖеҸ– list.json зҙўеј•жӘ”");
    
    const fileList = await listResponse.json();
    
    // жё…з©әијүе…ҘдёӯжҸҗзӨә
    container.innerHTML = "";
    
    // еҫӘз’°ијүе…Ҙжё…е–®е…§зҡ„жӘ”жЎҲ
    for (const fileName of fileList) {
      await loadWordsFromFile(fileName);
    }
    
    if (fileList.length === 0) {
      container.innerHTML = "зҙўеј•жӘ”е…§жІ’жңүд»»дҪ•жӘ”жЎҲгҖӮ";
    }
  } catch (err) {
    console.error(err);
    container.innerHTML = `<p style="color:red">еҲқе§ӢеҢ–еӨұж•—пјҡ${err.message}</p>`;
  }
}

// ијүе…Ҙе–®дёҖжӘ”жЎҲдёҰе»әз«ӢжҠҳз–ҠеҚҖеЎҠ
async function loadWordsFromFile(fileName) {
  try {
    const response = await fetch(`txt/${fileName}`);
    if (!response.ok) throw new Error(`жүҫдёҚеҲ°жӘ”жЎҲ: ${fileName}`);
    const text = await response.text();
    
    // жӘ”еҗҚеҺ»жҺү .txt з•¶дҪңеҲҶйЎһж¬„дҪҚеҗҚзЁұ
    const sectionTitleText = fileName.replace(".txt", "");
    
    const section = document.createElement("section");
    section.className = "section";

    const title = document.createElement("div");
    title.className = "section-title";
    title.innerHTML = `<span class="arrow">в–¶</span> ${sectionTitleText}`;

    const row = document.createElement("div");
    row.className = "content-row collapsed"; // й җиЁӯж”¶еҗҲ

    // й»һж“ҠдәӢд»¶пјҡеұ•й–Ӣ/ж”¶еҗҲ
    title.addEventListener("click", () => {
      row.classList.toggle("collapsed");
      title.querySelector(".arrow").classList.toggle("rotate");
    });

    const lines = text.split("\n").map(line => line.trim()).filter(line => line);


    lines.forEach(line => {
  const idx = line.indexOf("|");
  if (idx !== -1) {
    const word = line.substring(0, idx).trim();
    const meaning = line.substring(idx + 1).trim();

    // йҮҚиҰҒпјҡиҷ•зҗҶеҸҘеӯҗдёӯзҡ„е–®еј•иҷҹпјҢйҳІжӯў HTML иӘһжі•е ұйҢҜ
    const safeWord = word.replace(/'/g, "\\'");

    const card = document.createElement("div");
    card.className = "term-card";
    card.dataset.word = word;
    card.innerHTML = `
      <div class="main-text">${word}</div>
      <div class="button-group">
        <button class="speak-button" onclick="speakWord('${safeWord}','en-GB')">рҹҮ¬рҹҮ§ иӢұејҸ</button>
        <button class="speak-button" onclick="speakWord('${safeWord}','en-US')">рҹҮәрҹҮё зҫҺејҸ</button>
        <button class="speak-button" onclick="repeatSpeak('${safeWord}','en-GB')">рҹ”Ғ иӢұејҸйҮҚж’ӯ</button>
        <button class="speak-button" onclick="repeatSpeak('${safeWord}','en-US')">рҹ”Ғ зҫҺејҸйҮҚж’ӯ</button>
      </div>
      <div class="sub-text">${meaning}</div>
    `;
    row.appendChild(card);
  }
});
   

    section.appendChild(title);
    section.appendChild(row);
    container.appendChild(section);
    
  } catch (err) {
    console.warn(`и·ійҒҺжӘ”жЎҲ ${fileName}: ${err.message}`);
  }
}

// ---------------- д»ҘдёӢзӮәеҺҹеҠҹиғҪеҫ®иӘҝ ----------------

function speakWord(word, lang) {
  speechSynthesis.cancel();
  clearAllRepeatStatus();

  const utterance = new SpeechSynthesisUtterance(word);
  utterance.lang = lang;
  speechSynthesis.speak(utterance);
}

function repeatSpeak(word, lang) {
  const key = word + lang;

  if (repeatStatus[key]) {
    speechSynthesis.cancel();
    repeatStatus[key] = false;
    return;
  }

  speechSynthesis.cancel();
  clearAllRepeatStatus();

  repeatStatus[key] = true;

  const utterance = new SpeechSynthesisUtterance(word);
  utterance.lang = lang;

  utterance.onend = () => {
    if (repeatStatus[key]) {
      speechSynthesis.speak(utterance);
    }
  };

  speechSynthesis.speak(utterance);
}

function clearAllRepeatStatus() {
  for (const key in repeatStatus) {
    repeatStatus[key] = false;
  }
}

// е…ЁйғЁеұ•й–Ӣ
function expandAll() {
  document.querySelectorAll(".content-row").forEach(row => {
    row.classList.remove("collapsed");
    const arrow = row.previousElementSibling.querySelector(".arrow");
    if (arrow) arrow.classList.add("rotate");
  });
}

// е…ЁйғЁж”¶еҗҲ
function collapseAll() {
  document.querySelectorAll(".content-row").forEach(row => {
    row.classList.add("collapsed");
    const arrow = row.previousElementSibling.querySelector(".arrow");
    if (arrow) arrow.classList.remove("rotate");
  });
}

// жҗңе°ӢеҠҹиғҪпјҲж”ҜжҸҙи·ЁжӘ”жЎҲжҗңе°ӢдёҰиҮӘеӢ•еұ•й–Ӣпјү
function searchWord() {
  const query = document.getElementById("searchInput").value.trim().toLowerCase();
  if (!query) return;

  let found = false;

  document.querySelectorAll(".term-card").forEach(card => {
    const word = card.dataset.word.toLowerCase();
    const row = card.closest(".content-row");
    const title = row.previousElementSibling;

    card.querySelector(".word").classList.remove("highlight");

    if (word.includes(query)) {
      found = true;
      row.classList.remove("collapsed");
      title.querySelector(".arrow").classList.add("rotate");

      card.querySelector(".word").classList.add("highlight");
      card.scrollIntoView({ behavior: "smooth", block: "center" });
    }
  });

  if (!found) {
    alert("жүҫдёҚеҲ°и©Іе–®еӯ—пјҒ");
  }
}

// еҹ·иЎҢијүе…Ҙ
init();
// --- жӣҙж–°жё¬й©—е…Ёеҹҹи®Ҡж•ё ---
let quizIndex = 0; // з•¶еүҚйЎҢиҷҹ
let isAnswering = false;

// жү“дәӮйҷЈеҲ—зҡ„еҮҪж•ё (Fisher-Yates Shuffle)
function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

function openQuiz() {
    const range = document.getElementById("quizRange").value;
    currentQuizList = [];
    
    if(range === "all") {
        Object.values(quizPool).forEach(list => currentQuizList.push(...list));
    } else {
        currentQuizList = [...quizPool[range]];
    }

    if(currentQuizList.length < 4) {
        alert("е–®еӯ—йҮҸдёҚи¶і 4 еҖӢпјҢз„Ўжі•й–Ӣе§Ӣжё¬й©—пјҒ");
        return;
    }

    // 1. еҲқе§ӢеҢ–зӢҖж…ӢиҲҮжё…е–®
    shuffleArray(currentQuizList); // жү“дәӮйЎҢзӣ®еҜҰзҸҫдёҚйҮҚиӨҮ
    quizIndex = 0;
    correctCount = 0;
    wrongCount = 0;
    document.getElementById("correctList").innerHTML = "";
    document.getElementById("wrongList").innerHTML = "";
    document.getElementById("quizCorrect").textContent = "0";
    document.getElementById("quizWrong").textContent = "0";
    
    document.getElementById("quizModal").style.display = "flex";
    nextQuestion();
}

function nextQuestion() {
    // жӘўжҹҘжҳҜеҗҰе·Іе®ҢжҲҗжүҖжңүйЎҢзӣ®
    if (quizIndex >= currentQuizList.length) {
        finishQuiz();
        return;
    }

    isAnswering = false;
    document.getElementById("quizFeedback").textContent = "";
    document.getElementById("quizProgress").textContent = `йҖІеәҰ: ${quizIndex + 1} / ${currentQuizList.length}`;
    
    const optionsBox = document.getElementById("quizOptions");
    optionsBox.innerHTML = "";

    // дҫқеәҸеҸ–йЎҢ
    const target = currentQuizList[quizIndex];
    document.getElementById("quizQuestionCN").textContent = target.cn;

    // йҡЁж©ҹйҒёдёүеҖӢе№Іж“ҫй … (еҫһжүҖжңүе–®еӯ—дёӯйҒё)
    let distractors = [];
    let allFlattened = [];
    Object.values(quizPool).forEach(l => allFlattened.push(...l));
    
    while(distractors.length < 3) {
        let rand = allFlattened[Math.floor(Math.random() * allFlattened.length)];
        if(rand.en !== target.en && !distractors.find(d => d.en === rand.en)) {
            distractors.push(rand);
        }
    }

    let options = [target, ...distractors].sort(() => Math.random() - 0.5);

    options.forEach(opt => {
        const btn = document.createElement("button");
        btn.className = "option-btn";
        btn.textContent = opt.en;
        btn.onclick = () => handleAnswer(opt, target, btn);
        optionsBox.appendChild(btn);
    });
}

function handleAnswer(selectedObj, targetObj, btnElement) {
    if(isAnswering) return;
    isAnswering = true;

    const isCorrect = selectedObj.en === targetObj.en;
    
    if(isCorrect) {
        correctCount++;
        document.getElementById("quizCorrect").textContent = correctCount;
        btnElement.classList.add("option-correct");
        document.getElementById("quizFeedback").style.color = "#00ff99";
        document.getElementById("quizFeedback").textContent = "Correct! вң“";
        addToList("correctList", targetObj, "correct");
    } else {
        wrongCount++;
        document.getElementById("quizWrong").textContent = wrongCount;
        btnElement.classList.add("option-wrong");
        document.getElementById("quizFeedback").style.color = "#ff5555";
        document.getElementById("quizFeedback").textContent = `Wrong! жӯЈзўәзӯ”жЎҲжҳҜ: ${targetObj.en}`;
        addToList("wrongList", targetObj, "wrong");
        
        // жЁҷзӨәжӯЈзўәжҢүйҲ•
        Array.from(document.querySelectorAll(".option-btn")).forEach(b => {
            if(b.textContent === targetObj.en) b.classList.add("option-correct");
        });
    }

    // зҫҺејҸеҸЈйҹіеҝөеҮәжӯЈзўәзӯ”жЎҲ
    const utterance = new SpeechSynthesisUtterance(targetObj.en);
    utterance.lang = 'en-US';
    utterance.onend = () => {
        quizIndex++; // и·ідёӢдёҖйЎҢ
        setTimeout(nextQuestion, 800);
    };
    speechSynthesis.speak(utterance);
}

// ж–°еўһеҲ°еҒҙйӮҠжё…е–®зҡ„еҮҪж•ё
function addToList(listId, wordObj, className) {
    const list = document.getElementById(listId);
    const item = document.createElement("div");
    item.className = `sidebar-item ${className}`;
    
    // иҷ•зҗҶе–®еј•иҷҹ
    const safeWord = wordObj.en.replace(/'/g, "\\'");
    
    item.innerHTML = `
        <div style="flex:1">
            <b style="color:white">${wordObj.en}</b><br>
            <small style="color:#aaa">${wordObj.cn}</small>
        </div>
        <button class="speak-button" onclick="speakWord('${safeWord}', 'en-US')">рҹ”Ҡ</button>
    `;
    // жңҖж–°зҡ„ж”ҫеңЁжңҖдёҠйқў
    list.insertBefore(item, list.firstChild);
}

function finishQuiz() {
    document.getElementById("quizQuestionCN").innerHTML = "рҹҺү жё¬й©—е®ҢжҲҗпјҒ";
    document.getElementById("quizOptions").innerHTML = `
        <div style="color:white; font-size:20px; margin-bottom:20px;">
            жӮЁзёҪе…ұе®ҢжҲҗдәҶ ${currentQuizList.length} йЎҢ<br>
            зӯ”е°Қ: ${correctCount} | зӯ”йҢҜ: ${wrongCount}
        </div>
        <button class="search-button" onclick="closeQuiz()">иҝ”еӣһдё»й Ғ</button>
    `;
    document.getElementById("quizProgress").textContent = "Quiz Completed";
}
























  // --- жё¬й©—еҠҹиғҪе°Ҳз”Ёзҡ„е…Ёеҹҹи®Ҡж•ё ---
let quizPool = {}; // е„ІеӯҳжүҖжңүе–®еӯ— { "еҲҶйЎһеҗҚ": [ {en, cn}, ... ] }
let currentQuizList = [];
let correctCount = 0;
let wrongCount = 0;
let isAnswering = false;

// дҝ®ж”№еҺҹжң¬зҡ„ loadWordsFromFileпјҢеңЁжҠ“еҸ–иіҮж–ҷжҷӮй ҶдҫҝеӯҳдёҖд»ҪеҲ° quizPool
// и«ӢжүҫеҲ°дҪ еҺҹжң¬зҡ„ loadWordsFromFile дёҰеңЁ lines.forEach иЈЎйқўеҠ е…Ҙе„ІеӯҳйӮҸијҜ
// жҲ–иҖ…зӣҙжҺҘз”Ёд»ҘдёӢгҖҢеӨ–жҺӣгҖҚж–№ејҸзӣЈжҺ§ж•ёж“ҡ
const originalLoadWords = loadWordsFromFile;
loadWordsFromFile = async function(fileName) {
    const result = await originalLoadWords(fileName); // еҹ·иЎҢеҺҹеҠҹиғҪ
    // д»ҘдёӢзӮәж–°еўһзҡ„е„ІеӯҳйӮҸијҜ
    const response = await fetch(`txt/${fileName}`);
    const text = await response.text();
    const catName = fileName.replace(".txt", "");
    const lines = text.split("\n").map(l => l.trim()).filter(l => l);
    
    quizPool[catName] = [];
    lines.forEach(line => {
        const idx = line.indexOf("|");
        if(idx !== -1) {
            quizPool[catName].push({
                en: line.substring(0, idx).trim(),
                cn: line.substring(idx + 1).trim()
            });
        }
    });

    // жӣҙж–°дёӢжӢүйҒёе–®
    const sel = document.getElementById("quizRange");
    const opt = document.createElement("option");
    opt.value = catName;
    opt.textContent = catName;
    sel.appendChild(opt);
};

function openQuiz() {
    const range = document.getElementById("quizRange").value;
    currentQuizList = [];
    
    if(range === "all") {
        Object.values(quizPool).forEach(list => currentQuizList.push(...list));
    } else {
        currentQuizList = [...quizPool[range]];
    }

    if(currentQuizList.length < 4) {
        alert("е–®еӯ—йҮҸдёҚи¶і 4 еҖӢпјҢз„Ўжі•й–Ӣе§Ӣжё¬й©—пјҒ");
        return;
    }

    correctCount = 0;
    wrongCount = 0;
    document.getElementById("quizCorrect").textContent = "0";
    document.getElementById("quizWrong").textContent = "0";
    document.getElementById("quizModal").style.display = "flex";
    nextQuestion();
}

function closeQuiz() {
    document.getElementById("quizModal").style.display = "none";
    speechSynthesis.cancel();
}

function nextQuestion() {
    isAnswering = false;
    document.getElementById("quizFeedback").textContent = "";
    const optionsBox = document.getElementById("quizOptions");
    optionsBox.innerHTML = "";

    // йҡЁж©ҹйҒёдёҖеҖӢз•¶йЎҢзӣ®
    const target = currentQuizList[Math.floor(Math.random() * currentQuizList.length)];
    document.getElementById("quizQuestionCN").textContent = target.cn;

    // йҡЁж©ҹйҒёдёүеҖӢз•¶е№Іж“ҫй …
    let distractors = [];
    let allFlattened = [];
    Object.values(quizPool).forEach(l => allFlattened.push(...l));
    
    while(distractors.length < 3) {
        let rand = allFlattened[Math.floor(Math.random() * allFlattened.length)];
        if(rand.en !== target.en && !distractors.find(d => d.en === rand.en)) {
            distractors.push(rand);
        }
    }

    // ж··еҗҲйҒёй …дёҰжү“дәӮ
    let options = [target, ...distractors].sort(() => Math.random() - 0.5);

    options.forEach(opt => {
        const btn = document.createElement("button");
        btn.className = "option-btn";
        btn.textContent = opt.en;
        btn.onclick = () => handleAnswer(opt.en, target.en, btn);
        optionsBox.appendChild(btn);
    });
}

function handleAnswer(selected, correct, btnElement) {
    if(isAnswering) return;
    isAnswering = true;

    if(selected === correct) {
        correctCount++;
        document.getElementById("quizCorrect").textContent = correctCount;
        btnElement.classList.add("option-correct");
        document.getElementById("quizFeedback").style.color = "#00ff99";
        document.getElementById("quizFeedback").textContent = "Correct! вң“";
    } else {
        wrongCount++;
        document.getElementById("quizWrong").textContent = wrongCount;
        btnElement.classList.add("option-wrong");
        document.getElementById("quizFeedback").style.color = "#ff5555";
        document.getElementById("quizFeedback").textContent = `Wrong! жӯЈзўәзӯ”жЎҲжҳҜ: ${correct}`;
        
        // йЎҜзӨәеҮәжӯЈзўәзҡ„йӮЈеҖӢжҢүйҲ•
        Array.from(document.querySelectorAll(".option-btn")).forEach(b => {
            if(b.textContent === correct) b.classList.add("option-correct");
        });
    }

    // иҮӘеӢ•д»ҘзҫҺејҸеҸЈйҹіеҝөеҮәжӯЈзўәзӯ”жЎҲ
    const utterance = new SpeechSynthesisUtterance(correct);
    utterance.lang = 'en-US';
    utterance.onend = () => {
        setTimeout(nextQuestion, 800); // еҝөе®ҢеҫҢзЁҚеҫ®еҒңй “еҶҚдёӢдёҖйЎҢ
    };
    speechSynthesis.speak(utterance);
}
  
</script>
