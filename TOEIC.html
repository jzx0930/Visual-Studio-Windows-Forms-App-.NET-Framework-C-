<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>TOEIC單字卡</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="index.css">
<script defer src="index.js"></script>
<style>
.speak-button {
  margin-left: 6px;
  cursor: pointer;
  padding: 4px 8px;
  border: 1px solid #333;
  border-radius: 4px;
  background-color: #eee;
  font-size: 12px;
}
.speak-button:hover { background-color: #ddd; }.section {
  margin-bottom: 24px;
  border: 1px solid #444;
  border-radius: 6px;
  overflow: hidden;
}
.section-title {
  background-color: #333;
  color: #00ff99;
  padding: 10px;
  font-size: 18px;
  font-weight: bold;
  cursor: pointer;
  display: flex;
  align-items: center;
}
.arrow { margin-right: 8px; transition: transform 0.3s; }
.arrow.rotate { transform: rotate(90deg); }.content-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  padding: 12px;
}
.term-card {
  background-color: #222;
  color: #fff;
  padding: 12px;
  border-radius: 6px;
  border: 1px solid #444;
}
.main-text { font-size: 16px; font-weight: bold; }
.sub-text { font-size: 14px; margin-top: 4px; color: #ccc; }@media (max-width: 768px) {
  .content-row { grid-template-columns: 1fr; }
}
.collapsed { display: none; }.controls { margin-bottom: 20px; display:flex; align-items:center; gap:8px; flex-wrap:wrap;}
.control-button {
  margin-right: 10px;
  padding: 6px 12px;
  border: 1px solid #333;
  border-radius: 4px;
  background-color: #eee;
  cursor: pointer;
}
.control-button:hover { background-color: #ddd; }.file-select {
  padding:6px 8px;
  border-radius:4px;
  border:1px solid #333;
  background:#111;
  color:#fff;
}.search-box { margin: 20px 0; text-align: center; }
.search-input {
  padding: 8px;
  width: 250px;
  border: 2px solid #0f0;
  border-radius: 6px;
  background-color: #111;
  color: #fff;
}
.search-button {
  padding: 8px 12px;
  margin-left: 8px;
  border: 2px solid #0f0;
  border-radius: 6px;
  background-color: #0f0;
  color: #000;
  cursor: pointer;
}
.search-button:hover { background-color: #00ff88; }
.highlight { background-color: yellow; color: black; font-weight: bold; }.back-button { display:inline-block; margin-bottom:10px; color:#00f; text-decoration:none; }
</style>
</head>
<body>
<div class="content-wrapper">
  <a href="index.html" class="back-button">🏠 返回主頁</a>
  <h2>📘 TOEIC 單字</h2>  <!-- 檔案選擇 + 全部展開 / 收合 控制 -->
  <div class="controls">
    <select id="fileSelect" class="file-select"></select>
    <button id="btnLoadFile" class="control-button">載入檔案</button>
    <button class="control-button" onclick="expandAll()">全部展開</button>
    <button class="control-button" onclick="collapseAll()">全部收合</button>
  </div>  <!-- 搜尋框 -->
  <div class="search-box">
    <input type="text" id="searchInput" class="search-input" placeholder="輸入英文單字搜尋...">
    <button class="search-button" onclick="searchWord()">搜尋</button>
  </div>  <div id="word-container"></div>
</div><script>
// 若 index.js 已包含 initFileLoader / renderCardsFromText 等功能，這裡只做簡單綁定初始行為以保險。
// 若 index.js 已自動在 DOMContentLoaded 初始化，這段會與其共存。
document.addEventListener("DOMContentLoaded", () => {
  // 若全域有 initFileLoader，呼叫它；否則嘗試自行載入 files.json 與預設檔案
  if (typeof initFileLoader === "function") {
    initFileLoader();
  } else {
    // 載入 txt/files.json（若存在）
    fetch("txt/files.json")
      .then(r => { if(!r.ok) throw new Error("files.json 讀取失敗"); return r.json(); })
      .then(list => {
        const select = document.getElementById("fileSelect");
        select.innerHTML = "";
        list.forEach(fn => {
          const opt = document.createElement("option");
          opt.value = fn;
          opt.textContent = fn;
          select.appendChild(opt);
        });
        if (list.length) loadFileAndRender(list[0]);
      })
      .catch(() => {
        // 若無 files.json，嘗試載入預設檔名 "單字.txt"
        const select = document.getElementById("fileSelect");
        select.innerHTML = "<option value=\"單字.txt\">單字.txt</option>";
        loadFileAndRender("單字.txt");
      });
  }  // 綁定按鈕（若 index.js 已處理，這不會覆寫）
  const btn = document.getElementById("btnLoadFile");
  btn.addEventListener("click", () => {
    const select = document.getElementById("fileSelect");
    const fn = select.value;
    if (!fn) return;
    if (typeof loadFileAndRender === "function") {
      loadFileAndRender(fn);
    } else {
      fetch(txt/${encodeURIComponent(fn)})
        .then(r => { if(!r.ok) throw new Error("檔案讀取失敗"); return r.text(); })
        .then(text => {
          if (typeof renderCardsFromText === "function") renderCardsFromText(text);
          else fallbackRender(text);
        })
        .catch(err => {
          document.getElementById("word-container").innerHTML = "<p style='color:red'>讀取失敗：" + err.message + "</p>";
          console.error(err);
        });
    }
  });
});// fallback renderer if not provided by index.js
function fallbackRender(text) {
  const lines = text.split("\n").map(l => l.trim()).filter(l => l);
  const container = document.getElementById("word-container");
  container.innerHTML = "";
  let section = null, row = null;
  lines.forEach(line => {
    if (/^單字/.test(line)) {
      section = document.createElement("section");
      section.className = "collapsed";
      const title = document.createElement("div");
      title.className = "section-title";
      const arrow = document.createElement("span");
      arrow.className = "arrow"; arrow.textContent = "▶";
      title.appendChild(arrow);
      title.appendChild(document.createTextNode(line));
      row = document.createElement("div"); row.className = "content-row";
      title.addEventListener("click", () => {
        row.classList.toggle("collapsed");
        arrow.classList.toggle("rotate");
        arrow.textContent = arrow.classList.contains("rotate") ? "▼" : "▶";
      });
      section.appendChild(title); section.appendChild(row); container.appendChild(section);
    } else {
      const idx = line.indexOf("|");
      if (idx !== -1 && row) {
        const word = line.substring(0, idx).trim();
        const meaning = line.substring(idx+1).trim();
        const card = document.createElement("div");
        card.className = "term-card";
        card.dataset.word = word;
        card.innerHTML =           <div class="main-text">             <span class="word">${escapeHtml(word)}</span>             <button class="speak-button" onclick="speakWord('${escapeJs(word)}','en-GB')">英式</button>             <button class="speak-button" onclick="speakWord('${escapeJs(word)}','en-US')">美式</button>             <button class="speak-button" onclick="repeatSpeak('${escapeJs(word)}','en-GB')">英式重播</button>             <button class="speak-button" onclick="repeatSpeak('${escapeJs(word)}','en-US')">美式重播</button>           </div>           <div class="sub-text">${escapeHtml(meaning)}</div>        ;
        row.appendChild(card);
      }
    }
  });
}function escapeHtml(s){ if (s==null) return ""; return String(s).replace(/&/g,'&').replace(/</g,'<').replace(/>/g,'>').replace(/"/g,'"').replace(/'/g,'''); }
function escapeJs(s){ if (s==null) return ""; return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }
</script>
</body>
</html>
