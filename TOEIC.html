<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>工程英文字卡</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="index.css">
  <script defer src="index.js"></script>
  <style>
    .speak-button {
      margin-left: 6px;
      cursor: pointer;
      padding: 4px 8px;
      border: 1px solid #333;
      border-radius: 4px;
      background-color: #eee;
      font-size: 12px;
    }
    .speak-button:hover {
      background-color: #ddd;
    }
  </style>
</head>
<body>
  <div class="content-wrapper">
    <a href="index.html" class="back-button">🏠 返回主頁</a>

    <h2>📘 工程常用單字</h2>
    <div id="word-container" class="content-row"></div>
  </div>

  <script>
    // 從 txt 檔讀取單字資料
    fetch("txt/單字(一).txt")
      .then(response => response.text())
      .then(text => {
        const lines = text.split("\n").map(line => line.trim()).filter(line => line);
        const container = document.getElementById("word-container");

        lines.forEach(line => {
          const idx = line.indexOf("|");
          if (idx !== -1) {
            const word = line.substring(0, idx).trim();       // 英文單字
            const meaning = line.substring(idx + 1).trim();   // 中文意思 + 詞性

            const card = document.createElement("div");
            card.className = "term-card";
            card.dataset.word = word;
            card.innerHTML = `
              <div class="main-text">
                <span class="word">${word}</span>
                <button class="speak-button" onclick="speakWord('${word}','en-GB')">英式</button>
                <button class="speak-button" onclick="speakWord('${word}','en-US')">美式</button>
              </div>
              <div class="sub-text">${meaning}</div>
            `;
            container.appendChild(card);
          }
        });
      });

    // 播放指定口音
    function speakWord(word, lang) {
      const utterance = new SpeechSynthesisUtterance(word);
      utterance.lang = lang; // 'en-GB' 英式, 'en-US' 美式
      speechSynthesis.speak(utterance);
    }
  </script>
</body>
</html>
