<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>TOEIC 工程英文字卡</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="index.css">
  <script defer src="index.js"></script>
  <style>
    .search-box {
      margin: 20px 0;
      text-align: center;
    }
    .search-input {
      padding: 8px;
      width: 250px;
      border: 2px solid #0f0;
      border-radius: 6px;
      background-color: #111;
      color: #fff;
    }
    .search-button {
      padding: 8px 12px;
      margin-left: 8px;
      border: 2px solid #0f0;
      border-radius: 6px;
      background-color: #0f0;
      color: #000;
      cursor: pointer;
    }
    .search-button:hover {
      background-color: #00ff88;
    }
    .highlight {
      background-color: yellow;
      color: black;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="content-wrapper">
    <a href="index.html" class="back-button">🏠 返回主頁</a>
    <h2>📘 TOEIC 工程常用單字</h2>

    <!-- 搜尋框 -->
    <div class="search-box">
      <input type="text" id="searchInput" class="search-input" placeholder="輸入英文單字搜尋...">
      <button class="search-button" onclick="searchWord()">搜尋</button>
    </div>

    <!-- 全部展開 / 收合控制 -->
    <div class="controls">
      <button class="control-button" onclick="expandAll()">全部展開</button>
      <button class="control-button" onclick="collapseAll()">全部收合</button>
    </div>

    <div id="word-container"></div>
  </div>

<script>
function speakWord(word, lang) {
  const utterance = new SpeechSynthesisUtterance(word);
  utterance.lang = lang;
  speechSynthesis.speak(utterance);
}

// 全部展開
function expandAll() {
  document.querySelectorAll("section").forEach(section => {
    section.classList.remove("collapsed");
    section.classList.add("expanded");
    const arrow = section.querySelector(".arrow");
    if (arrow) arrow.textContent = "▼";
  });
}

// 全部收合
function collapseAll() {
  document.querySelectorAll("section").forEach(section => {
    section.classList.remove("expanded");
    section.classList.add("collapsed");
    const arrow = section.querySelector(".arrow");
    if (arrow) arrow.textContent = "▶";
  });
}

// 搜尋功能
function searchWord() {
  const query = document.getElementById("searchInput").value.trim().toLowerCase();
  if (!query) return;

  let found = false;

  document.querySelectorAll(".term-card").forEach(card => {
    const word = card.dataset.word.toLowerCase();
    const section = card.closest("section");

    // 移除舊的 highlight
    card.querySelector(".word").classList.remove("highlight");

    if (word.includes(query)) {
      found = true;
      // 展開所在段落
      section.classList.remove("collapsed");
      section.classList.add("expanded");
      const arrow = section.querySelector(".arrow");
      if (arrow) arrow.textContent = "▼";

      // 高亮顯示
      card.querySelector(".word").classList.add("highlight");

      // 滾動到該字卡
      card.scrollIntoView({ behavior: "smooth", block: "center" });
    }
  });

  if (!found) {
    alert("找不到該單字！");
  }
}
</script>
</body>
</html>
