
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>TOEIC單字卡</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="index.css">
<script defer src="index.js"></script>
<style>

/* 測驗佈局調整 */
#quizModal .quiz-layout {
  display: flex;
  width: 95%;
  max-width: 1200px;
  height: 80vh;
  gap: 20px;
}

.quiz-sidebar {
  flex: 1;
  background: #222;
  border: 1px solid #444;
  border-radius: 10px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.sidebar-title {
  padding: 10px;
  text-align: center;
  font-weight: bold;
  background: #333;
}

.sidebar-content {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
}

.sidebar-item {
  background: #333;
  margin-bottom: 8px;
  padding: 8px;
  border-radius: 5px;
  font-size: 14px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-left: 4px solid #444;
}

.sidebar-item.correct { border-left-color: #00ff99; }
.sidebar-item.wrong { border-left-color: #ff5555; }

.main-quiz-area {
  flex: 1.5;
  background: #333;
  padding: 30px;
  border-radius: 15px;
  text-align: center;
  border: 2px solid #00ff99;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.exit-btn {
  margin-top: 20px;
  padding: 10px 20px;
  background: #555;
  color: white;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}
.exit-btn:hover { background: #777; }

/* 隱藏原生捲軸但保留功能 (可選) */
.sidebar-content::-webkit-scrollbar { width: 5px; }
.sidebar-content::-webkit-scrollbar-thumb { background: #555; }







  
  
/* 測驗選項按鈕樣式 */
.option-btn {
  padding: 15px;
  background: #444;
  color: white;
  border: 1px solid #666;
  border-radius: 8px;
  cursor: pointer;
  font-size: 18px;
  transition: all 0.2s;
}
.option-btn:hover { background: #555; border-color: #00ff99; }
.option-correct { background: #008855 !important; border-color: #00ff99 !important; }
.option-wrong { background: #882222 !important; border-color: #ff5555 !important; }


  
.speak-button {
  margin-left: 6px;
  cursor: pointer;
  padding: 4px 8px;
  border: 1px solid #333;
  border-radius: 4px;
  background-color: #eee;
  font-size: 12px;
}
.speak-button:hover { background-color: #ddd; }

.section {
  margin-bottom: 24px;
  border: 1px solid #444;
  border-radius: 6px;
  overflow: hidden;
}
.section-title {
  background-color: #333;
  color: #00ff99;
  padding: 10px;
  font-size: 18px;
  font-weight: bold;
  cursor: pointer;
  display: flex;
  align-items: center;
}
.arrow { margin-right: 8px; transition: transform 0.3s; }
.arrow.rotate { transform: rotate(90deg); }

.content-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  padding: 12px;
}
.term-card {
  background-color: #222;
  color: #fff;
  padding: 12px;
  border-radius: 6px;
  border: 1px solid #444;
}
.main-text { font-size: 16px; font-weight: bold; }
.sub-text { font-size: 14px; margin-top: 4px; color: #ccc; }

@media (max-width: 768px) {
  .content-row { grid-template-columns: 1fr; }
}
.collapsed { display: none; }

.controls { margin-bottom: 20px; }
.control-button {
  margin-right: 10px;
  padding: 6px 12px;
  border: 1px solid #333;
  border-radius: 4px;
  background-color: #eee;
  cursor: pointer;
}
.control-button:hover { background-color: #ddd; }

.search-box { margin: 20px 0; text-align: center; }
.search-input {
  padding: 8px;
  width: 250px;
  border: 2px solid #0f0;
  border-radius: 6px;
  background-color: #111;
  color: #fff;
}
.search-button {
  padding: 8px 12px;
  margin-left: 8px;
  border: 2px solid #0f0;
  border-radius: 6px;
  background-color: #0f0;
  color: #000;
  cursor: pointer;
}
.search-button:hover { background-color: #00ff88; }
.highlight { background-color: yellow; color: black; font-weight: bold; }
</style>
</head>
<body>
<div class="content-wrapper">
  <a href="index.html" class="back-button">🏠 返回主頁</a>




<div id="quizModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:9999; justify-content:center; align-items:center;">
  <div class="quiz-layout">
    
    <div class="quiz-sidebar">
      <div class="sidebar-title" style="color: #00ff99;">✓ 正確清單</div>
      <div id="correctList" class="sidebar-content"></div>
    </div>

    <div class="main-quiz-area">
      <div style="margin-bottom: 20px;">
        <span style="color:#00ff99;">正確: <span id="quizCorrect">0</span></span> |  
        <span style="color:#ff5555;">錯誤: <span id="quizWrong">0</span></span>
        <div id="quizProgress" style="font-size: 12px; color: #888; margin-top: 5px;">進度: 0 / 0</div>
      </div>

      <h3 id="quizQuestionCN" style="font-size: 28px; color:#fff; margin-bottom: 30px;">題目</h3>
      
      <div id="quizOptions" style="display:grid; grid-template-columns:1fr; gap:12px;"></div>
      
      <p id="quizFeedback" style="margin-top:20px; font-weight:bold; height:24px;"></p>
      
      <button class="exit-btn" onclick="closeQuiz()">提前結束測驗</button>
    </div>

    <div class="quiz-sidebar">
      <div class="sidebar-title" style="color: #ff5555;">✗ 錯誤清單</div>
      <div id="wrongList" class="sidebar-content"></div>
    </div>

  </div>
</div>

  



  <h2>📘 TOEIC 單字</h2>

  <!-- 搜尋框 -->
  <div class="search-box">
    <input type="text" id="searchInput" class="search-input" placeholder="輸入英文單字搜尋...">
    <button class="search-button" onclick="searchWord()">搜尋</button>
  </div>

  <!-- 全部展開 / 收合控制 -->
  <div class="controls">
    <button class="control-button" onclick="expandAll()">全部展開</button>
    <button class="control-button" onclick="collapseAll()">全部收合</button>
  </div>

  <div id="word-container"></div>
</div>

<script>
// 記錄重播狀態
const repeatStatus = {};
const container = document.getElementById("word-container");

// 初始化：先抓取 list.json 索引檔，再依序載入所有 .txt
async function init() {
  container.innerHTML = "正在讀取索引檔...";

  try {
    // 讀取 list.json 獲取檔案清單
    const listResponse = await fetch("txt/list.json");
    if (!listResponse.ok) throw new Error("無法讀取 list.json 索引檔");
    
    const fileList = await listResponse.json();
    
    // 清空載入中提示
    container.innerHTML = "";
    
    // 循環載入清單內的檔案
    for (const fileName of fileList) {
      await loadWordsFromFile(fileName);
    }
    
    if (fileList.length === 0) {
      container.innerHTML = "索引檔內沒有任何檔案。";
    }
  } catch (err) {
    console.error(err);
    container.innerHTML = `<p style="color:red">初始化失敗：${err.message}</p>`;
  }
}

// 載入單一檔案並建立折疊區塊
async function loadWordsFromFile(fileName) {
  try {
    const response = await fetch(`txt/${fileName}`);
    if (!response.ok) throw new Error(`找不到檔案: ${fileName}`);
    const text = await response.text();
    
    // 檔名去掉 .txt 當作分類欄位名稱
    const sectionTitleText = fileName.replace(".txt", "");
    
    const section = document.createElement("section");
    section.className = "section";

    const title = document.createElement("div");
    title.className = "section-title";
    title.innerHTML = `<span class="arrow">▶</span> ${sectionTitleText}`;

    const row = document.createElement("div");
    row.className = "content-row collapsed"; // 預設收合

    // 點擊事件：展開/收合
    title.addEventListener("click", () => {
      row.classList.toggle("collapsed");
      title.querySelector(".arrow").classList.toggle("rotate");
    });

    const lines = text.split("\n").map(line => line.trim()).filter(line => line);


    lines.forEach(line => {
  const idx = line.indexOf("|");
  if (idx !== -1) {
    const word = line.substring(0, idx).trim();
    const meaning = line.substring(idx + 1).trim();

    // 重要：處理句子中的單引號，防止 HTML 語法報錯
    const safeWord = word.replace(/'/g, "\\'");

    const card = document.createElement("div");
    card.className = "term-card";
    card.dataset.word = word;
    card.innerHTML = `
      <div class="main-text">${word}</div>
      <div class="button-group">
        <button class="speak-button" onclick="speakWord('${safeWord}','en-GB')">🇬🇧 英式</button>
        <button class="speak-button" onclick="speakWord('${safeWord}','en-US')">🇺🇸 美式</button>
        <button class="speak-button" onclick="repeatSpeak('${safeWord}','en-GB')">🔁 英式重播</button>
        <button class="speak-button" onclick="repeatSpeak('${safeWord}','en-US')">🔁 美式重播</button>
      </div>
      <div class="sub-text">${meaning}</div>
    `;
    row.appendChild(card);
  }
});
   

    section.appendChild(title);
    section.appendChild(row);
    container.appendChild(section);
    
  } catch (err) {
    console.warn(`跳過檔案 ${fileName}: ${err.message}`);
  }
}

// ---------------- 以下為原功能微調 ----------------

function speakWord(word, lang) {
  speechSynthesis.cancel();
  clearAllRepeatStatus();

  const utterance = new SpeechSynthesisUtterance(word);
  utterance.lang = lang;
  speechSynthesis.speak(utterance);
}

function repeatSpeak(word, lang) {
  const key = word + lang;

  if (repeatStatus[key]) {
    speechSynthesis.cancel();
    repeatStatus[key] = false;
    return;
  }

  speechSynthesis.cancel();
  clearAllRepeatStatus();

  repeatStatus[key] = true;

  const utterance = new SpeechSynthesisUtterance(word);
  utterance.lang = lang;

  utterance.onend = () => {
    if (repeatStatus[key]) {
      speechSynthesis.speak(utterance);
    }
  };

  speechSynthesis.speak(utterance);
}

function clearAllRepeatStatus() {
  for (const key in repeatStatus) {
    repeatStatus[key] = false;
  }
}

// 全部展開
function expandAll() {
  document.querySelectorAll(".content-row").forEach(row => {
    row.classList.remove("collapsed");
    const arrow = row.previousElementSibling.querySelector(".arrow");
    if (arrow) arrow.classList.add("rotate");
  });
}

// 全部收合
function collapseAll() {
  document.querySelectorAll(".content-row").forEach(row => {
    row.classList.add("collapsed");
    const arrow = row.previousElementSibling.querySelector(".arrow");
    if (arrow) arrow.classList.remove("rotate");
  });
}

// 搜尋功能（支援跨檔案搜尋並自動展開）
function searchWord() {
  const query = document.getElementById("searchInput").value.trim().toLowerCase();
  if (!query) return;

  let found = false;

  document.querySelectorAll(".term-card").forEach(card => {
    const word = card.dataset.word.toLowerCase();
    const row = card.closest(".content-row");
    const title = row.previousElementSibling;

    card.querySelector(".word").classList.remove("highlight");

    if (word.includes(query)) {
      found = true;
      row.classList.remove("collapsed");
      title.querySelector(".arrow").classList.add("rotate");

      card.querySelector(".word").classList.add("highlight");
      card.scrollIntoView({ behavior: "smooth", block: "center" });
    }
  });

  if (!found) {
    alert("找不到該單字！");
  }
}

// 執行載入
init();
// --- 更新測驗全域變數 ---
let quizIndex = 0; // 當前題號
let isAnswering = false;

// 打亂陣列的函數 (Fisher-Yates Shuffle)
function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

function openQuiz() {
    const range = document.getElementById("quizRange").value;
    currentQuizList = [];
    
    if(range === "all") {
        Object.values(quizPool).forEach(list => currentQuizList.push(...list));
    } else {
        currentQuizList = [...quizPool[range]];
    }

    if(currentQuizList.length < 4) {
        alert("單字量不足 4 個，無法開始測驗！");
        return;
    }

    // 1. 初始化狀態與清單
    shuffleArray(currentQuizList); // 打亂題目實現不重複
    quizIndex = 0;
    correctCount = 0;
    wrongCount = 0;
    document.getElementById("correctList").innerHTML = "";
    document.getElementById("wrongList").innerHTML = "";
    document.getElementById("quizCorrect").textContent = "0";
    document.getElementById("quizWrong").textContent = "0";
    
    document.getElementById("quizModal").style.display = "flex";
    nextQuestion();
}

function nextQuestion() {
    // 檢查是否已完成所有題目
    if (quizIndex >= currentQuizList.length) {
        finishQuiz();
        return;
    }

    isAnswering = false;
    document.getElementById("quizFeedback").textContent = "";
    document.getElementById("quizProgress").textContent = `進度: ${quizIndex + 1} / ${currentQuizList.length}`;
    
    const optionsBox = document.getElementById("quizOptions");
    optionsBox.innerHTML = "";

    // 依序取題
    const target = currentQuizList[quizIndex];
    document.getElementById("quizQuestionCN").textContent = target.cn;

    // 隨機選三個干擾項 (從所有單字中選)
    let distractors = [];
    let allFlattened = [];
    Object.values(quizPool).forEach(l => allFlattened.push(...l));
    
    while(distractors.length < 3) {
        let rand = allFlattened[Math.floor(Math.random() * allFlattened.length)];
        if(rand.en !== target.en && !distractors.find(d => d.en === rand.en)) {
            distractors.push(rand);
        }
    }

    let options = [target, ...distractors].sort(() => Math.random() - 0.5);

    options.forEach(opt => {
        const btn = document.createElement("button");
        btn.className = "option-btn";
        btn.textContent = opt.en;
        btn.onclick = () => handleAnswer(opt, target, btn);
        optionsBox.appendChild(btn);
    });
}

function handleAnswer(selectedObj, targetObj, btnElement) {
    if(isAnswering) return;
    isAnswering = true;

    const isCorrect = selectedObj.en === targetObj.en;
    
    if(isCorrect) {
        correctCount++;
        document.getElementById("quizCorrect").textContent = correctCount;
        btnElement.classList.add("option-correct");
        document.getElementById("quizFeedback").style.color = "#00ff99";
        document.getElementById("quizFeedback").textContent = "Correct! ✓";
        addToList("correctList", targetObj, "correct");
    } else {
        wrongCount++;
        document.getElementById("quizWrong").textContent = wrongCount;
        btnElement.classList.add("option-wrong");
        document.getElementById("quizFeedback").style.color = "#ff5555";
        document.getElementById("quizFeedback").textContent = `Wrong! 正確答案是: ${targetObj.en}`;
        addToList("wrongList", targetObj, "wrong");
        
        // 標示正確按鈕
        Array.from(document.querySelectorAll(".option-btn")).forEach(b => {
            if(b.textContent === targetObj.en) b.classList.add("option-correct");
        });
    }

    // 美式口音念出正確答案
    const utterance = new SpeechSynthesisUtterance(targetObj.en);
    utterance.lang = 'en-US';
    utterance.onend = () => {
        quizIndex++; // 跳下一題
        setTimeout(nextQuestion, 800);
    };
    speechSynthesis.speak(utterance);
}

// 新增到側邊清單的函數
function addToList(listId, wordObj, className) {
    const list = document.getElementById(listId);
    const item = document.createElement("div");
    item.className = `sidebar-item ${className}`;
    
    // 處理單引號
    const safeWord = wordObj.en.replace(/'/g, "\\'");
    
    item.innerHTML = `
        <div style="flex:1">
            <b style="color:white">${wordObj.en}</b><br>
            <small style="color:#aaa">${wordObj.cn}</small>
        </div>
        <button class="speak-button" onclick="speakWord('${safeWord}', 'en-US')">🔊</button>
    `;
    // 最新的放在最上面
    list.insertBefore(item, list.firstChild);
}

function finishQuiz() {
    document.getElementById("quizQuestionCN").innerHTML = "🎉 測驗完成！";
    document.getElementById("quizOptions").innerHTML = `
        <div style="color:white; font-size:20px; margin-bottom:20px;">
            您總共完成了 ${currentQuizList.length} 題<br>
            答對: ${correctCount} | 答錯: ${wrongCount}
        </div>
        <button class="search-button" onclick="closeQuiz()">返回主頁</button>
    `;
    document.getElementById("quizProgress").textContent = "Quiz Completed";
}
  
</script>
</body>
</html>
