<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>TOEIC單字卡 - 測驗模式</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
/* --- 原有樣式 --- */
body { background-color: #111; color: #fff; font-family: sans-serif; padding: 20px; }
.speak-button { margin-left: 6px; cursor: pointer; padding: 4px 8px; border: 1px solid #333; border-radius: 4px; background-color: #eee; font-size: 12px; color: #000; }
.section { margin-bottom: 24px; border: 1px solid #444; border-radius: 6px; overflow: hidden; }
.section-title { background-color: #333; color: #00ff99; padding: 10px; font-size: 18px; font-weight: bold; cursor: pointer; display: flex; align-items: center; }
.arrow { margin-right: 8px; transition: transform 0.3s; }
.arrow.rotate { transform: rotate(90deg); }
.content-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; padding: 12px; }
.term-card { background-color: #222; padding: 12px; border-radius: 6px; border: 1px solid #444; }
.main-text { font-size: 16px; font-weight: bold; margin-bottom: 8px; }
.button-group { margin-bottom: 8px; }
.sub-text { font-size: 14px; color: #ccc; }
@media (max-width: 768px) { .content-row { grid-template-columns: 1fr; } }
.collapsed { display: none; }
.controls { margin-bottom: 20px; }
.control-button { margin-right: 10px; padding: 8px 16px; border: none; border-radius: 4px; background-color: #00ff99; cursor: pointer; font-weight: bold; color: #000; }
.search-box { margin: 20px 0; text-align: center; }
.search-input { padding: 8px; width: 250px; border: 2px solid #00ff99; border-radius: 6px; background-color: #111; color: #fff; }
.highlight { background-color: yellow; color: black; font-weight: bold; }

/* --- 測驗功能專屬樣式 --- */
#quiz-overlay {
  display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.95); z-index: 1000; flex-direction: column; align-items: center; justify-content: center;
}
.quiz-container { background: #222; padding: 30px; border-radius: 12px; width: 90%; max-width: 500px; text-align: center; border: 2px solid #00ff99; }
.quiz-question { font-size: 24px; color: #00ff99; margin-bottom: 20px; }
.options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.option-btn { padding: 15px; background: #333; color: #fff; border: 1px solid #555; border-radius: 8px; cursor: pointer; font-size: 16px; transition: 0.2s; }
.option-btn:hover { background: #444; border-color: #00ff99; }
.score-board { margin-top: 20px; font-size: 14px; display: flex; justify-content: space-around; }
.score-correct { color: #00ff99; }
.score-wrong { color: #ff5555; }
#quiz-close { margin-top: 20px; padding: 5px 15px; background: #555; color: #fff; border: none; cursor: pointer; border-radius: 4px; }
.range-select { margin-bottom: 15px; padding: 8px; background: #333; color: white; border-radius: 4px; }
</style>
</head>
<body>

<div class="content-wrapper">
  <a href="index.html" style="color:#aaa; text-decoration:none;">🏠 返回主頁</a>
  <h2>📘 TOEIC 單字學習系統</h2>

  <div class="search-box">
    <input type="text" id="searchInput" class="search-input" placeholder="搜尋英文單字...">
    <button class="control-button" onclick="searchWord()">搜尋</button>
  </div>

  <div class="controls">
    <button class="control-button" onclick="expandAll()">全部展開</button>
    <button class="control-button" onclick="collapseAll()">全部收合</button>
    <button class="control-button" style="background-color: #ff5555; color: white;" onclick="openQuizSetup()">📝 開始抽考</button>
  </div>

  <div id="word-container"></div>
</div>

<div id="quiz-overlay">
  <div class="quiz-container" id="quiz-setup">
    <h3>選擇抽考範圍</h3>
    <select id="rangeSelector" class="range-select"></select>
    <br>
    <button class="control-button" onclick="startQuiz()">開始測驗</button>
    <button id="quiz-close" onclick="closeQuiz()">取消</button>
  </div>

  <div class="quiz-container" id="quiz-content" style="display:none;">
    <div id="question-count" style="font-size: 12px; color: #888;"></div>
    <div class="quiz-question" id="q-chinese">題目內容</div>
    <div class="options-grid" id="options-box">
      </div>
    <div class="score-board">
      <span class="score-correct">正確: <span id="count-correct">0</span></span>
      <span class="score-wrong">錯誤: <span id="count-wrong">0</span></span>
    </div>
    <button id="quiz-close" onclick="closeQuiz()">結束測驗</button>
  </div>
</div>

<script>
// 全域資料儲存
let allWordsData = {}; // 格式: { "檔名": [{en, cn}, ...] }
let quizPool = [];
let currentQuestion = null;
let stats = { correct: 0, wrong: 0 };
const repeatStatus = {};

// 初始化
async function init() {
  const container = document.getElementById("word-container");
  container.innerHTML = "載入中...";

  try {
    const listRes = await fetch("txt/list.json");
    const fileList = await listRes.json();
    
    container.innerHTML = "";
    const selector = document.getElementById("rangeSelector");
    selector.innerHTML = '<option value="all">全部範圍</option>';

    for (const fileName of fileList) {
      const catName = fileName.replace(".txt", "");
      allWordsData[catName] = await loadWordsFromFile(fileName, container);
      
      // 填充抽考下拉選單
      const opt = document.createElement("option");
      opt.value = catName;
      opt.textContent = catName;
      selector.appendChild(opt);
    }
  } catch (err) {
    container.innerHTML = "載入失敗: " + err.message;
  }
}

// 載入並渲染
async function loadWordsFromFile(fileName, container) {
  const res = await fetch(`txt/${fileName}`);
  const text = await res.text();
  const catName = fileName.replace(".txt", "");
  const words = [];

  const section = document.createElement("section");
  section.className = "section";
  
  const title = document.createElement("div");
  title.className = "section-title";
  title.innerHTML = `<span class="arrow">▶</span> ${catName}`;
  
  const row = document.createElement("div");
  row.className = "content-row collapsed";
  
  title.onclick = () => {
    row.classList.toggle("collapsed");
    title.querySelector(".arrow").classList.toggle("rotate");
  };

  text.split("\n").forEach(line => {
    const parts = line.split("|");
    if (parts.length === 2) {
      const en = parts[0].trim();
      const cn = parts[1].trim();
      words.push({ en, cn });

      const safeEn = en.replace(/'/g, "\\'");
      const card = document.createElement("div");
      card.className = "term-card";
      card.dataset.word = en;
      card.innerHTML = `
        <div class="main-text">${en}</div>
        <div class="button-group">
          <button class="speak-button" onclick="speakWord('${safeEn}','en-GB')">🇬🇧</button>
          <button class="speak-button" onclick="speakWord('${safeEn}','en-US')">🇺🇸</button>
        </div>
        <div class="sub-text">${cn}</div>
      `;
      row.appendChild(card);
    }
  });

  section.appendChild(title);
  section.appendChild(row);
  container.appendChild(section);
  return words;
}

// --- 測驗邏輯 ---

function openQuizSetup() {
  document.getElementById("quiz-overlay").style.display = "flex";
  document.getElementById("quiz-setup").style.display = "block";
  document.getElementById("quiz-content").style.display = "none";
}

function startQuiz() {
  const range = document.getElementById("rangeSelector").value;
  quizPool = [];
  
  if (range === "all") {
    Object.values(allWordsData).forEach(list => quizPool.push(...list));
  } else {
    quizPool = [...allWordsData[range]];
  }

  if (quizPool.length < 4) {
    alert("單字量不足（至少需 4 個單字才能測驗）");
    return;
  }

  stats = { correct: 0, wrong: 0 };
  updateScore();
  document.getElementById("quiz-setup").style.display = "none";
  document.getElementById("quiz-content").style.display = "block";
  nextQuestion();
}

function nextQuestion() {
  // 隨機選一個正確答案
  const correctIdx = Math.floor(Math.random() * quizPool.length);
  currentQuestion = quizPool[correctIdx];

  // 抓取 3 個錯誤答案 (誘答)
  let distractors = [];
  const allWordsFlattened = Object.values(allWordsData).flat();
  
  while (distractors.length < 3) {
    const randWord = allWordsFlattened[Math.floor(Math.random() * allWordsFlattened.length)];
    if (randWord.en !== currentQuestion.en && !distractors.includes(randWord.en)) {
      distractors.push(randWord.en);
    }
  }

  // 混合選項
  const options = [currentQuestion.en, ...distractors].sort(() => Math.random() - 0.5);

  // 渲染
  document.getElementById("q-chinese").textContent = currentQuestion.cn;
  const box = document.getElementById("options-box");
  box.innerHTML = "";
  options.forEach(opt => {
    const btn = document.createElement("button");
    btn.className = "option-btn";
    btn.textContent = opt;
    btn.onclick = () => checkAnswer(opt);
    box.appendChild(btn);
  });
}

function checkAnswer(choice) {
  if (choice === currentQuestion.en) {
    stats.correct++;
    // 答對效果：可以加個短暫變綠
    nextQuestion();
  } else {
    stats.wrong++;
    alert(`答錯了！正確答案是：${currentQuestion.en}`);
    nextQuestion();
  }
  updateScore();
}

function updateScore() {
  document.getElementById("count-correct").textContent = stats.correct;
  document.getElementById("count-wrong").textContent = stats.wrong;
}

function closeQuiz() {
  document.getElementById("quiz-overlay").style.display = "none";
}

// --- 其他原有功能 ---
function speakWord(word, lang) {
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(word);
  u.lang = lang;
  speechSynthesis.speak(u);
}

function expandAll() {
  document.querySelectorAll(".content-row").forEach(r => {
    r.classList.remove("collapsed");
    r.previousElementSibling.querySelector(".arrow").classList.add("rotate");
  });
}

function collapseAll() {
  document.querySelectorAll(".content-row").forEach(r => {
    r.classList.add("collapsed");
    r.previousElementSibling.querySelector(".arrow").classList.remove("rotate");
  });
}

function searchWord() {
  const query = document.getElementById("searchInput").value.toLowerCase();
  document.querySelectorAll(".term-card").forEach(card => {
    const word = card.dataset.word.toLowerCase();
    const row = card.closest(".content-row");
    if (word.includes(query)) {
      row.classList.remove("collapsed");
      card.style.border = "2px solid #00ff99";
      card.scrollIntoView({ behavior: "smooth", block: "center" });
    } else {
      card.style.border = "1px solid #444";
    }
  });
}

init();
</script>

</body>
</html>
